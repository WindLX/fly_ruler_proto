syntax = "proto3";

package flyruler;

message Uuid {
  bytes value = 1; // 16-byte UUID payload
}

message Vector3 {
  double x = 1;
  double y = 2;
  double z = 3;
}

message Quaternion {
  double w = 1;
  double x = 2;
  double y = 3;
  double z = 4;
}

message DerivedState {
  double lat      = 1;
  double lon      = 2;
  double altitude = 3;
  double alpha    = 4;
  double beta     = 5;
  double tas      = 6;
  double eas      = 7;
  double gamma    = 8;
  double chi      = 9;
  optional double ias  = 10;
  optional double cas  = 11;
  optional double mach = 12;
  optional double ground_speed = 13;
  // Positive upward in meters/second.
  optional double vertical_speed = 14;
  optional double dynamic_pressure = 15;
  optional double normal_load_factor = 16;
}

message ControlSurfaceState {
  optional double aileron_left_rad  = 1;
  optional double aileron_right_rad = 2;
  optional double elevator_rad      = 3;
  optional double rudder_rad        = 4;
  optional double flaps_left_ratio  = 5;
  optional double flaps_right_ratio = 6;
  optional double spoilers_ratio    = 7;
}

enum PropulsorKind {
  PROPULSOR_KIND_UNSPECIFIED = 0;
  PROPULSOR_KIND_JET         = 1;
  PROPULSOR_KIND_PROPELLER   = 2;
  PROPULSOR_KIND_ROTOR       = 3;
}

message PropulsorState {
  string         propulsor_id        = 1;
  PropulsorKind kind                 = 2;
  optional double throttle_ratio     = 3;
  optional double rpm                = 4;
  optional double blade_pitch_rad    = 5;
  optional double thrust_newton      = 6;
  optional double torque_newton_meter = 7;
  // Optional consumer slot. MSFS maps indices 1 through 4 to engine slots.
  optional uint32 index               = 8;
}

enum TelemetryValueType {
  TELEMETRY_VALUE_TYPE_UNSPECIFIED = 0;
  TELEMETRY_VALUE_TYPE_F64         = 1;
  TELEMETRY_VALUE_TYPE_I64         = 2;
  TELEMETRY_VALUE_TYPE_BOOL        = 3;
}

message TelemetryField {
  string             field_id    = 1;
  string             label       = 2;
  string             group       = 3;
  string             unit        = 4;
  string             description = 5;
  TelemetryValueType value_type  = 6;
}

message TelemetryStreamSchema {
  string                  stream_id       = 1;
  string                  name            = 2;
  optional double         nominal_rate_hz = 3;
  repeated TelemetryField fields          = 4;
}

message TelemetryValue {
  oneof kind {
    double f64_value  = 1;
    int64  i64_value  = 2;
    bool   bool_value = 3;
  }
}

message TelemetryFrame {
  string                  stream_id = 1;
  uint64                  sequence  = 2;
  repeated TelemetryValue values    = 3;
}

message AircraftState {
  Vector3              position         = 1;
  // Body-FRD velocity in meters/second: x forward, y right, z down.
  Vector3              velocity         = 2;
  Quaternion           attitude         = 3;
  Vector3              angular_velocity = 4;
  DerivedState         derived          = 5;
  ControlSurfaceState  control_surfaces = 7;
  // Body-FRD acceleration in meters/second^2.
  Vector3              linear_acceleration_body = 9;
  repeated PropulsorState propulsors    = 10;
}

message AircraftSpawnInfo {
  string        name          = 1;
  string        toml_config   = 2;
  AircraftState initial_state = 3;
  repeated TelemetryStreamSchema telemetry_schemas = 4;
}

message DespawnInfo {
  optional string reason = 1;
}

message AircraftCommandInfo {
  oneof kind {
    AircraftSpawnInfo spawn        = 1;
    DespawnInfo       despawn      = 2;
    AircraftState     state_update = 3;
    string            custom_event = 4;
    TelemetryFrame    telemetry_frame = 5;
  }
}

message AircraftEvent {
  Uuid                aircraft_id = 1;
  AircraftCommandInfo info        = 2;
}

message Handshake {
  string version     = 1;
  Uuid   client_uuid = 2;
}

message Heartbeat {
  uint64 seq_num     = 1;
  Uuid   client_uuid = 2;
}

message RequestCommand {
  oneof kind {
    Handshake     handshake      = 1;
    Heartbeat     heartbeat      = 2;
    AircraftEvent aircraft_event = 3;
  }
}

message Request {
  Uuid           id        = 1;
  // Finite seconds on the producer-defined source timeline. Producers may use
  // Unix time or a simulation clock, but one session must use a consistent base.
  double         timestamp = 2;
  RequestCommand command   = 3;
}

message ResponseData {
  oneof kind {
    bool ack              = 1;
    Uuid aircraft_spawned = 2;
  }
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED    = 0;
  INVALID_AIRCRAFT_ID       = 1;
  TOML_PARSE_ERROR          = 2;
  UNKNOWN_FIELD             = 3;
  PROTOCOL_VERSION_MISMATCH = 4;
  INVALID_STATE             = 5;
  INVALID_TELEMETRY_SCHEMA  = 6;
  INVALID_TELEMETRY_FRAME   = 7;
}

message ResponseError {
  ErrorCode code        = 1;
  string    message     = 2;
  Uuid      aircraft_id = 3;
}

message Response {
  Uuid   id        = 1;
  // Echoes the request source-timeline timestamp when available.
  double timestamp = 2;
  oneof result {
    ResponseData  ok  = 3;
    ResponseError err = 4;
  }
}

message Message {
  oneof envelope {
    Request  request  = 1;
    Response response = 2;
  }
}
