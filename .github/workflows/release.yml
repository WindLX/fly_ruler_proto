name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================================
  # Web: lint, test, and build the production dashboard
  # ============================================================
  build-web:
    name: Build Web console
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install Web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web
      - name: Check and build Web console
        run: pnpm check
        working-directory: web
      - name: Upload Web assets
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error
          retention-days: 7

  # ============================================================
  # Server: Linux daemon plus its production Web assets
  # ============================================================
  build-server:
    name: Build Linux server bundle
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - name: Verify downloaded Web assets
        run: |
          test -f web/dist/index.html
          test -n "$(find web/dist/assets -maxdepth 1 -type f -name '*.js' -print -quit)"
          test -n "$(find web/dist/assets -maxdepth 1 -type f -name '*.css' -print -quit)"
      - name: Build daemon
        run: cargo build -p fly_ruler_proto_server --release
      - name: Stage daemon bundle
        run: |
          mkdir -p stage/fly-ruler-server/web
          cp target/release/fly-ruler-server stage/fly-ruler-server/
          cp -R web/dist stage/fly-ruler-server/web/
          cp server/README.md LICENSE RELEASING.md stage/fly-ruler-server/
          tar -C stage -czf fly-ruler-server-linux-x86_64.tar.gz fly-ruler-server
      - name: Verify server release archive
        run: |
          tar -tzf fly-ruler-server-linux-x86_64.tar.gz \
            | grep -Fx 'fly-ruler-server/fly-ruler-server'
          tar -tzf fly-ruler-server-linux-x86_64.tar.gz \
            | grep -Fx 'fly-ruler-server/web/dist/index.html'
          tar -tzf fly-ruler-server-linux-x86_64.tar.gz \
            | grep -Eq '^fly-ruler-server/web/dist/assets/.+\.js$'
          tar -tzf fly-ruler-server-linux-x86_64.tar.gz \
            | grep -Eq '^fly-ruler-server/web/dist/assets/.+\.css$'
      - uses: actions/upload-artifact@v4
        with:
          name: server-bundle
          path: fly-ruler-server-linux-x86_64.tar.gz
          if-no-files-found: error

  # ============================================================
  # Core: package source (.crate) for GitHub Release
  # ============================================================
  package-core:
    name: Package core source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package core crate
        run: cargo package -p fly_ruler_proto_core
      - name: Upload core source
        uses: actions/upload-artifact@v4
        with:
          name: core-source
          path: target/package/fly_ruler_proto_core-*.crate

  # ============================================================
  # Core: publish to crates.io
  # This job is independent — a failure here does not block the
  # GitHub Release. Requires CARGO_REGISTRY_TOKEN secret.
  # ============================================================
  publish-crates-io:
    name: Publish core to crates.io
    needs: package-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish to crates.io if version is new
        shell: bash
        run: |
          set -euo pipefail

          version="$(
            python3 -c \
              'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["workspace"]["package"]["version"])'
          )"
          endpoint="https://crates.io/api/v1/crates/fly_ruler_proto_core/${version}"
          status="$(
            curl --silent --show-error \
              --retry 3 \
              --user-agent "fly_ruler_proto-release-ci/1.0 (https://github.com/WindLX/fly_ruler_proto)" \
              --output /dev/null \
              --write-out '%{http_code}' \
              "${endpoint}"
          )"

          case "${status}" in
            200)
              echo "fly_ruler_proto_core ${version} already exists on crates.io; skipping."
              ;;
            404)
              cargo publish -p fly_ruler_proto_core
              ;;
            *)
              echo "::error::Unexpected crates.io API response: HTTP ${status}"
              exit 1
              ;;
          esac
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ============================================================
  # Python: build Linux wheels (x86_64 + aarch64)
  # ============================================================
  build-wheels-linux:
    name: Build Python wheel (Linux ${{ matrix.target }})
    strategy:
      matrix:
        target: [x86_64, aarch64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install Python
        run: uv python install 3.12
        working-directory: bindings/python
      - name: Validate Python lockfile
        run: uv sync --locked --no-dev --no-install-project
        working-directory: bindings/python
      - name: Install QEMU (for aarch64 cross-compile)
        if: matrix.target == 'aarch64'
        run: sudo apt-get update && sudo apt-get install -y qemu-user
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --out dist
          sccache: "true"
          working-directory: bindings/python
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: bindings/python/dist/*.whl

  # ============================================================
  # Python: build Windows wheel
  # ============================================================
  build-wheel-windows:
    name: Build Python wheel (Windows x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install Python
        run: uv python install 3.12
        working-directory: bindings/python
      - name: Validate Python lockfile
        run: uv sync --locked --no-dev --no-install-project
        working-directory: bindings/python
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist
          sccache: "true"
          working-directory: bindings/python
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: bindings/python/dist/*.whl

  # ============================================================
  # MSFS: cross-compile bridge (Windows binary from Linux)
  #
  # Required: MSFS 2024 SDK cached in .msfs2024-sdk/
  #
  # To seed the cache:
  #   Run the "Seed MSFS SDK cache" workflow on the self-hosted
  #   runner tagged with msfs-sdk.
  # ============================================================
  build-msfs:
    name: Build MSFS bridge (Windows cross-compile)
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - name: Verify downloaded Web assets
        run: |
          test -f web/dist/index.html
          test -n "$(find web/dist/assets -maxdepth 1 -type f -name '*.js' -print -quit)"
          test -n "$(find web/dist/assets -maxdepth 1 -type f -name '*.css' -print -quit)"
      - name: Install LLVM archive tool
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18 zip unzip
          sudo ln -sf /usr/bin/llvm-lib-18 /usr/local/bin/llvm-lib
          command -v llvm-lib
      - name: Install Windows Rust target
        run: rustup target add x86_64-pc-windows-msvc
      - name: Install cargo-xwin
        run: cargo install --locked cargo-xwin
      - name: Restore MSFS SDK from cache
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: .msfs2024-sdk
          key: msfs2024-sdk-1.6.9-linux-v1
      - name: Check SDK availability
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          echo "::error::MSFS 2024 SDK cache miss."
          echo "::error::Run the 'Seed MSFS SDK cache' workflow on the self-hosted msfs-sdk runner."
          echo "::error::Expected cache key: msfs2024-sdk-1.6.9-linux-v1"
          exit 1
      - name: Set MSFS SDK environment variable
        run: echo "MSFS2024_SDK=$(pwd)/.msfs2024-sdk/MSFS 2024 SDK" >> $GITHUB_ENV
      - name: Build MSFS bridge
        run: cargo xwin build -p fly_ruler_proto_msfs --target x86_64-pc-windows-msvc --release
      - name: Stage MSFS bundle
        run: |
          scripts/package_msfs_bundle.sh release stage/fly-ruler-msfs
          cd stage
          zip -r ../fly-ruler-msfs-windows-x86_64.zip fly-ruler-msfs
      - name: Verify MSFS release archive
        run: |
          unzip -t fly-ruler-msfs-windows-x86_64.zip
          for path in \
            fly-ruler-msfs/fly-ruler-msfs-bridge.exe \
            fly-ruler-msfs/SimConnect.dll \
            fly-ruler-msfs/fly-ruler-msfs.example.toml \
            fly-ruler-msfs/README.md \
            fly-ruler-msfs/RELEASING.md \
            fly-ruler-msfs/LICENSE \
            fly-ruler-msfs/SHA256SUMS \
            fly-ruler-msfs/web/dist/index.html
          do
            unzip -Z1 fly-ruler-msfs-windows-x86_64.zip | grep -Fx "${path}"
          done
          unzip -Z1 fly-ruler-msfs-windows-x86_64.zip \
            | grep -Eq '^fly-ruler-msfs/web/dist/assets/.+\.js$'
          unzip -Z1 fly-ruler-msfs-windows-x86_64.zip \
            | grep -Eq '^fly-ruler-msfs/web/dist/assets/.+\.css$'
      - name: Upload MSFS bundle
        uses: actions/upload-artifact@v4
        with:
          name: msfs-bundle
          path: fly-ruler-msfs-windows-x86_64.zip
          if-no-files-found: error

  # ============================================================
  # Python: publish wheels to PyPI
  # Requires GitHub environment "pypi" with Trusted Publishing
  # enabled (OIDC). See the plan for setup instructions.
  # ============================================================
  publish-pypi:
    name: Publish Python wheels to PyPI
    needs: [build-wheels-linux, build-wheel-windows]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      - name: Verify Python distributions
        run: |
          find dist -maxdepth 1 -type f -name '*.whl' -print
          test -n "$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)"
          test -z "$(find dist -maxdepth 1 -type f ! -name '*.whl' -print -quit)"
      - name: Check whether this version already exists on PyPI
        id: pypi-version
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          endpoint="https://pypi.org/pypi/fly-ruler-proto-python/${version}/json"
          status="$(
            curl --silent --show-error \
              --retry 3 \
              --user-agent "fly_ruler_proto-release-ci/1.0 (https://github.com/WindLX/fly_ruler_proto)" \
              --output /dev/null \
              --write-out '%{http_code}' \
              "${endpoint}"
          )"

          case "${status}" in
            200)
              echo "fly-ruler-proto-python ${version} already exists on PyPI; skipping upload."
              echo "exists=true" >> "${GITHUB_OUTPUT}"
              ;;
            404)
              echo "exists=false" >> "${GITHUB_OUTPUT}"
              ;;
            *)
              echo "::error::Unexpected PyPI API response: HTTP ${status}"
              exit 1
              ;;
          esac
      - name: Publish Python distributions to PyPI
        if: steps.pypi-version.outputs.exists != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  # ============================================================
  # Create GitHub Release with all build artifacts
  # ============================================================
  github-release:
    name: Create GitHub Release
    needs:
      [
        package-core,
        build-wheels-linux,
        build-wheel-windows,
        build-server,
        build-msfs,
      ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: core-source
          path: release-artifacts
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: release-artifacts
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          pattern: server-bundle
          path: release-artifacts
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          pattern: msfs-bundle
          path: release-artifacts
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
