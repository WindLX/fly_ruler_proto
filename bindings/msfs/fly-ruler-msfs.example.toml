[bridge]
listen = "127.0.0.1:18002"
# aircraft_id = "00112233445566778899aabbccddeeff"
tick_hz = 240.0
# SimConnect render/write cadence. Defaults to tick_hz when omitted.
render_hz = 240.0
# latest preserves old latest-sample writes for A/B tests.
# low_latency is the default: 30 ms interpolation delay + 40 ms short extrapolation.
# smooth uses 80 ms interpolation delay + 20 ms short extrapolation.
smoothing_mode = "low_latency"
interpolation_delay_ms = 20
max_extrapolation_ms = 20
stale_timeout_ms = 500

[management]
enabled = true
listen = "0.0.0.0:18003"
# Paths are resolved relative to the directory from which the bridge is launched.
data_root = "sessions"
web_root = "web/dist"
# public_api_base_url = "https://sim.example.test/api/v1"
# public_websocket_url = "wss://sim.example.test/api/v1/ws"
ws_hz = 30.0
cors_origins = [
  "http://localhost:5173",
  "http://127.0.0.1:5173",
]

[logging]
level = "info"
# file_path = "logs/fly-ruler-msfs.log"
