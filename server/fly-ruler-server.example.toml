schema_version = 1

[transport]
udp_listen = "127.0.0.1:18002"
heartbeat_interval_secs = 5
heartbeat_timeout_secs = 15

[management]
enabled = true
listen = "127.0.0.1:18003"
# Paths are resolved relative to the directory from which the server is launched.
data_root = "sessions"
web_root = "web/dist"
# public_api_base_url = "https://sim.example.test/api/v1"
# public_websocket_url = "wss://sim.example.test/api/v1/ws"
websocket_hz = 30.0
cors_origins = [
  "http://localhost:5173",
  "http://127.0.0.1:5173",
]

[playback]
default_speed = 1.0
min_speed = 0.1
max_speed = 16.0

[logging]
level = "info"
# file_path = "logs/fly-ruler-server.log"
